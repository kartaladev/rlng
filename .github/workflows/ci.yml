name: ci

# Per-push / per-PR quality gate for the library: build, vet, format, race
# tests, lint, and vulnerability scan across the supported Go versions.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Support Go 1.25+ (see CLAUDE.md). Keep the range in sync with go.mod.
        go: ['1.25.x', '1.26.x']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build
        run: CGO_ENABLED=0 go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needs to run on:"; echo "$out"; exit 1; fi
      - name: Test (race + coverage)
        run: go test ./... -race -coverprofile=cover.out
      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go mod verify

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
